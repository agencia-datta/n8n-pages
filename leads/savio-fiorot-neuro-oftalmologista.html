<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Análise de Marketing — Dr. Savio Fiorot | Agência Datta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <style>
        :root {
            --verde-escuro: #091105;
            --verde-medio: #00392F;
            --cinza-escuro: #323232;
            --branco: #FFFFFF;
            --verde-claro: #00503f;
            --verde-accent: #00694f;
            --fundo-claro: #f6f7f5;
            --fundo-card: rgba(0, 57, 47, 0.04);
            --borda-sutil: rgba(0, 57, 47, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: var(--cinza-escuro);
            background: var(--branco);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        a { text-decoration: none; color: inherit; }

        .container {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 24px;
        }

        /* ─── ANIMATIONS ─── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes slideRight {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .animate {
            animation: fadeUp 0.7s ease-out both;
        }
        .animate-delay-1 { animation-delay: 0.1s; }
        .animate-delay-2 { animation-delay: 0.2s; }
        .animate-delay-3 { animation-delay: 0.3s; }
        .animate-delay-4 { animation-delay: 0.4s; }
        .animate-delay-5 { animation-delay: 0.5s; }

        /* ─── HEADER ─── */
        .header {
            background: var(--verde-escuro);
            padding: 16px 0;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-logo {
            font-family: 'DM Serif Display', serif;
            color: var(--branco);
            font-size: 20px;
            letter-spacing: 1px;
        }
        .header-logo span {
            color: var(--verde-accent);
            font-weight: 400;
        }
        .header nav ul {
            list-style: none;
            display: flex;
            gap: 28px;
            align-items: center;
        }
        .header nav a {
            color: rgba(255,255,255,0.65);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .header nav a:hover { color: var(--branco); }

        /* ─── HERO ─── */
        .hero {
            background: var(--verde-escuro);
            padding: 100px 0 120px;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(0,57,47,0.4) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -10%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0,57,47,0.2) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        .hero .container { position: relative; z-index: 1; }
        .hero-label {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.45);
            margin-bottom: 24px;
            animation: fadeIn 0.6s ease-out both;
        }
        .hero h1 {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(36px, 5vw, 56px);
            font-weight: 400;
            color: var(--branco);
            line-height: 1.15;
            margin-bottom: 28px;
            max-width: 720px;
            animation: fadeUp 0.7s ease-out 0.15s both;
        }
        .hero h1 em {
            font-style: italic;
            color: rgba(255,255,255,0.55);
        }
        .hero-desc {
            font-size: 17px;
            color: rgba(255,255,255,0.55);
            line-height: 1.7;
            max-width: 540px;
            animation: fadeUp 0.7s ease-out 0.3s both;
        }
        .hero-line {
            width: 60px;
            height: 3px;
            background: var(--verde-medio);
            margin-top: 40px;
            border-radius: 2px;
            animation: fadeUp 0.7s ease-out 0.45s both;
        }

        /* ─── SECTIONS ─── */
        .section { padding: 90px 0; }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--verde-medio);
            margin-bottom: 12px;
        }
        .section-heading {
            font-family: 'DM Serif Display', serif;
            font-size: clamp(28px, 3.5vw, 40px);
            font-weight: 400;
            line-height: 1.2;
            margin-bottom: 16px;
            color: var(--verde-escuro);
        }
        .section-subtitle {
            font-size: 16px;
            color: rgba(50,50,50
