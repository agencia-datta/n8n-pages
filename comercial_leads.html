<script>
(function() {
  const DATA = JSON.parse(document.getElementById('leads-data').textContent);
  const tbody = document.getElementById('leads-body');
  const empty = document.getElementById('empty');
  const countEl = document.getElementById('count');
  const fStatus = document.getElementById('filter-status');
  const fCat = document.getElementById('filter-categoria');
  const fSearch = document.getElementById('filter-search');

  // Populate filter options
  const statuses = [...new Set(DATA.map(r => r.status).filter(v => v != null))].sort();
  for (const s of statuses) {
    const o = document.createElement('option');
    o.value = s;
    o.textContent = s;
    fStatus.appendChild(o);
  }
  const categorias = [...new Set(DATA.map(r => r.categoria).filter(v => v != null))].sort();
  for (const c of categorias) {
    const o = document.createElement('option');
    o.value = c;
    o.textContent = c;
    fCat.appendChild(o);
  }

  let sortKey = 'id';
  let sortDir = -1;

  function statusBadge(s) {
    if (!s) return '<span class="badge">—</span>';
    let cls = 'badge';
    if (s.startsWith('00_')) cls += ' badge-status-00';
    else if (s.startsWith('16_')) cls += ' badge-status-16';
    else if (s.toLowerCase().includes('análise')) cls += ' badge-status-analise';
    else if (s.includes('Tier S')) cls += ' badge-status-tier-s';
    else if (s.includes('Tier A')) cls += ' badge-status-tier-a';
    else if (s.includes('Tier B')) cls += ' badge-status-tier-b';
    return '<span class="' + cls + '">' + escapeHtml(s) + '</span>';
  }

  function escapeHtml(s) {
    if (s == null) return '';
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function fmt(v) {
    if (v == null || v === '') return '<span style="color:var(--muted);">—</span>';
    return escapeHtml(v);
  }

  function linksCell(row) {
    const parts = [];
    if (row.instagram_url) parts.push('<a href="' + escapeHtml(row.instagram_url) + '" target="_blank" rel="noopener">IG</a>');
    if (row.site_url) parts.push('<a href="' + escapeHtml(row.site_url) + '" target="_blank" rel="noopener">Site</a>');
    if (row.material_de_prospeccao) parts.push('<a href="' + escapeHtml(row.material_de_prospeccao) + '" target="_blank" rel="noopener">Material</a>');
    return parts.join(' · ') || '<span style="color:var(--muted);">—</span>';
  }

  function applyFilters() {
    const sv = fStatus.value;
    const cv = fCat.value;
    const q = fSearch.value.trim().toLowerCase();

    let rows = DATA.filter(r => {
      if (sv && r.status !== sv) return false;
      if (cv && r.categoria !== cv) return false;
      if (q) {
        const hay = [r.nome, r.google_cidade, r.google_bairro, r.ig_username, r.categoria, r.fonte_de_pesquisa]
          .filter(Boolean).join(' ').toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });

    rows.sort((a, b) => {
      let av = a[sortKey], bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      const an = Number(av), bn = Number(bv);
      if (!isNaN(an) && !isNaN(bn)) return (an - bn) * sortDir;
      return String(av).localeCompare(String(bv)) * sortDir;
    });

    tbody.innerHTML = '';
    countEl.textContent = rows.length;
    if (rows.length === 0) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';
    const frag = document.createDocumentFragment();
    for (const r of rows) {
      const tr = document.createElement('tr');
      tr.className = 'row-link';
      tr.dataset.id = r.id;
      tr.innerHTML =
        '<td class="id-cell">' + fmt(r.id) + '</td>' +
        '<td>' + fmt(r.data) + '</td>' +
        '<td>' + fmt(r.nome) + '</td>' +
        '<td>' + fmt(r.categoria) + '</td>' +
        '<td>' + statusBadge(r.status) + '</td>' +
        '<td>' + fmt(r.fonte_de_pesquisa) + '</td>' +
        '<td>' + fmt(r.google_cidade) + '</td>' +
        '<td>' + fmt(r.google_score) + '</td>' +
        '<td>' + fmt(r.google_reviews) + '</td>' +
        '<td>' + fmt(r.ig_seguidores) + '</td>' +
        '<td>' + fmt(r.ig_username) + '</td>' +
        '<td>' + linksCell(r) + '</td>';
      frag.appendChild(tr);
    }
    tbody.appendChild(frag);
  }

  // Event listeners
  fStatus.addEventListener('change', applyFilters);
  fCat.addEventListener('change', applyFilters);
  fSearch.addEventListener('input', applyFilters);

  document.querySelectorAll('thead th[data-key]').forEach(th => {
    th.addEventListener('click', () => {
      const key = th.dataset.key;
      if (sortKey === key) sortDir = -sortDir;
      else { sortKey = key; sortDir = 1; }
      applyFilters();
    });
  });

  // Modal for full detail
  const overlay = document.getElementById('modal-overlay');
  const modalContent = document.getElementById('modal-content');
  document.getElementById('modal-close').addEventListener('click', () => overlay.classList.remove('active'));
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('active'); });

  tbody.addEventListener('click', e => {
    const tr = e.target.closest('tr.row-link');
    if (!tr) return;
    if (e.target.tagName === 'A') return;
    const id = Number(tr.dataset.id);
    const row = DATA.find(r => r.id === id);
    if (!row) return;
    let html = '<h2>' + escapeHtml(row.nome || '(sem nome)') + '</h2>';
    html += '<div class="subtitle" style="color:var(--muted);font-size:13px;">ID ' + row.id + ' · ' + escapeHtml(row.data || '') + '</div>';
    const order = ['status','categoria','fonte_de_pesquisa','google_cidade','google_bairro','google_telefone','google_score','google_reviews','google_rank','ig_username','ig_biografia','ig_seguidores','ig_seguindo','ig_posts','instagram_url','site_url','material_de_prospeccao','site_analise','instagram_analise','mensagem_de_prospeccao','id_clickup'];
    for (const k of order) {
      const v = row[k];
      if (v == null || v === '') continue;
      html += '<div class="field"><div class="field-label">' + k + '</div><div class="field-value">';
      if (typeof v === 'string' && /^https?:\/\//.test(v)) {
        html += '<a href="' + escapeHtml(v) + '" target="_blank" rel="noopener">' + escapeHtml(v) + '</a>';
      } else {
        html += escapeHtml(v);
      }
      html += '</div></div>';
    }
    modalContent.innerHTML = html;
    overlay.classList.add('active');
  });

  applyFilters();
})();
</script>
